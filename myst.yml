# $env:BASE_URL = "/manual"
# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: aaa93d8b-b87b-406a-9a35-bce45f124075
  title: The TUD guide to open publishing with JupyterBook
  description: This is a manual for open publishing with JupyterBook (2) for Delft University of Technology.
  keywords: [Jupyter Book; Open Publishing; Open Education; Open Science]
  github: https://github.com/TUD-JB-OS/book
  date: 2026-04-15
  plugins:
    - https://github.com/jupyter-book/myst-plugins/releases/download/page-last-updatedv1.1/page-last-updated.mjs
  
  references:
    myst-guide: https://mystmd.org/guide
    jb: https://jupyterbook.org/
    MC: https://freekpols.github.io/Mechanica
    WS: https://jupyter-book.github.io/workshop-template/

  jupyter:
    binder:
      repo: https://github.com/executablebooks/thebe-binder-base
  execute:
    execute_notebooks: true

extends:
  - authors.yml
  # - export/export.yml
  - toc.yml

site:
  template: book-theme
  options:
    style: style/custom.css
    hide_authors: true
    favicon: style/favicon.ico
    logo: style/tudelft.png
    logo_dark: style/tudelft-dark.png
    logo_url: https://jboss.tudelft.nl
    folders: true

  parts:
    footer: style/footer.md

  nav:
    - title: Manual
      children:
      - title: Introduction
        url: /content/general/intro
      - title: Scientific publishing
        url: /content/science/intro
      - title: Educational publishing
        url: /content/education/intro
    - title: Starterkit
      url: https://jboss.tudelft.nl/starterkit
    - title: Templates
      url: https://jboss.tudelft.nl/templates/
